<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargador de YouTube</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        .format-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .format-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-download {
            background-color: #3b82f6;
            color: white;
        }
        .btn-download:hover {
            background-color: #2563eb;
        }
        .btn-donate {
            background-color: #10b981;
            color: white;
        }
        .btn-donate:hover {
            background-color: #059669;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
            min-height: 20px;
        }
        .loader {
            display: none;
            border: 3px solid #334155;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Descargador de YouTube</h1>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Pega el enlace de YouTube aquí..." autocomplete="off">
        </div>

        <div class="format-group">
            <label class="format-label">
                <input type="radio" name="format" value="mp4" checked> Video (MP4)
            </label>
            <label class="format-label">
                <input type="radio" name="format" value="mp3"> Audio (MP3)
            </label>
        </div>

        <div class="buttons-group">
            <button class="btn-download" onclick="downloadMedia()">Descargar</button>
            <button class="btn-donate" onclick="openDonate()">Apoyar (Donar)</button>
        </div>

        <div class="loader" id="loader"></div>
        <div class="status" id="statusText"></div>
    </div>

    <script>
        function openDonate() {
            // Link de Ko-fi para donaciones
            window.open('https://ko-fi.com/ludr4wings', '_blank');
        }

        async function downloadMedia() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            const statusText = document.getElementById('statusText');
            const loader = document.getElementById('loader');

            if (!urlInput) {
                statusText.style.color = '#ef4444';
                statusText.innerText = 'Por favor, ingresa un enlace de YouTube válido.';
                return;
            }

            statusText.style.color = '#94a3b8';
            statusText.innerText = 'Preparando descarga, por favor espera...';
            loader.style.display = 'block';

            try {
                // Llama a la API de Vercel
                const response = await fetch(`/api/download?url=${encodeURIComponent(urlInput)}&format=${format}`);
                
                if (!response.ok) {
                    throw new Error('No se pudo procesar el video. Verifica el enlace.');
                }

                // Descargar el archivo
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = downloadUrl;
                
                // Extraer el nombre del archivo de las cabeceras si es posible
                let filename = `descarga.${format}`;
                const disposition = response.headers.get('content-disposition');
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) { 
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }

                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(downloadUrl);
                
                statusText.style.color = '#10b981';
                statusText.innerText = '¡Descarga completada!';
            } catch (error) {
                console.error(error);
                statusText.style.color = '#ef4444';
                statusText.innerText = error.message || 'Ocurrió un error al descargar.';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>

</body>
</html>
